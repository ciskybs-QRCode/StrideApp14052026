kind = "mobile"
previewPath = "/app/"
title = "Stride App"
version = "1.0.0"
id = "artifacts/stride-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/app/" ]
localPort = 22361

[services.development]
run = "pnpm --filter @workspace/stride-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stride-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/stride-app", "run", "serve" ]

[services.env]
PORT = "22361"
BASE_PATH = "/app/"
