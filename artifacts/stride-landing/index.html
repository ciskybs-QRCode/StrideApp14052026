    <!-- PWA redirect: if the landing page was mistakenly saved to home screen, snap to the app -->
    <script>
      (function() {
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        if (isStandalone && location.pathname !== '/app/' && !location.pathname.startsWith('/app/')) {
          location.replace('/app/');
        }
      })();
    </script>
