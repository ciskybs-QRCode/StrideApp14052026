name: Sync to GitHub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # To change retention without editing this file, set the BACKUP_RETENTION_COUNT
      # repository variable under Settings → Secrets and variables → Actions → Variables.
      BACKUP_RETENTION_COUNT: ${{ vars.BACKUP_RETENTION_COUNT || 7 }}
      # Maximum number of Slack retry notices sent per failure incident before going
      # silent. Set SLACK_RETRY_NOTICE_CAP as a repository variable to override.
      SLACK_RETRY_NOTICE_CAP: ${{ vars.SLACK_RETRY_NOTICE_CAP || 5 }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preflight — check Slack webhook secret
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REQUIRE_SLACK_WEBHOOK: ${{ vars.REQUIRE_SLACK_WEBHOOK }}
        with:
          script: |
            if (!process.env.SLACK_WEBHOOK_URL) {
              const requireWebhook = process.env.REQUIRE_SLACK_WEBHOOK === 'true';
              const message =
                'SLACK_WEBHOOK_URL secret is not set. ' +
                'Slack notifications will be silently skipped for the entire run. ' +
                'See docs/slack-alerts.md for setup instructions.';
              if (requireWebhook) {
                core.setFailed(
                  'REQUIRE_SLACK_WEBHOOK is true but SLACK_WEBHOOK_URL secret is not set. ' +
                  'Add the secret under Settings → Secrets and variables → Actions → Secrets, ' +
                  'or set REQUIRE_SLACK_WEBHOOK to false to downgrade this to a warning. ' +
                  'See docs/slack-alerts.md for setup instructions.'
                );
              } else {
                core.warning(message);
              }
            } else {
              console.log('SLACK_WEBHOOK_URL is configured — Slack notifications are active.');
            }

      - name: Push to target repository
        id: push
        run: |
          git remote add target https://x-access-token:${{ secrets.GITHUB_PAT }}@github.com/ciskybs-QRCode/StrideApp14052026.git

          # Strategy: create a dated backup branch on the target before force-pushing.
          # This preserves any commits that exist only on the target (e.g. hotfixes
          # pushed directly there) so they can always be recovered, even though
          # --force will overwrite target/main.
          BACKUP_BRANCH="backup/main-$(date -u +%Y%m%d-%H%M%S)"
          git fetch target main --depth=1 || true
          if git rev-parse FETCH_HEAD &>/dev/null; then
            git push target "FETCH_HEAD:refs/heads/${BACKUP_BRANCH}"
            echo "Created backup branch ${BACKUP_BRANCH} on target"
          else
            echo "Target main does not exist yet — skipping backup branch creation"
          fi

          # Temporarily disable errexit so we can capture the exit code and
          # stderr text from a failing push before deciding what to do.
          set +e
          PUSH_OUTPUT=$(git push target main --force 2>&1)
          PUSH_EXIT=$?
          set -e

          if [ $PUSH_EXIT -ne 0 ]; then
            TRUNCATED="${PUSH_OUTPUT:0:500}"
            {
              echo "push_error<<PUSH_EOF"
              printf '%s\n' "$TRUNCATED"
              echo "PUSH_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Push failed (exit ${PUSH_EXIT}): ${PUSH_OUTPUT}"
            exit $PUSH_EXIT
          fi
          echo "$PUSH_OUTPUT"
          echo "push_error=" >> "$GITHUB_OUTPUT"

      - name: Prune old backup branches on target
        id: prune
        if: success()
        run: |
          git fetch target 'refs/heads/backup/main-*:refs/remotes/target/backup/main-*' --prune 2>/dev/null || true

          # List backup branches sorted newest-first (branch names are dated so lexicographic = chronological)
          BACKUPS=$(git branch -r --list 'target/backup/main-*' | sed 's|target/||' | sort -r)

          TOTAL=$(echo "$BACKUPS" | grep -c . || true)
          echo "Found ${TOTAL} backup branch(es); keeping ${BACKUP_RETENTION_COUNT}"

          if [ "$TOTAL" -le "$BACKUP_RETENTION_COUNT" ]; then
            echo "Nothing to prune."
            echo "deleted_branches=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TO_DELETE=$(echo "$BACKUPS" | tail -n +"$((BACKUP_RETENTION_COUNT + 1))")
          DELETED_LIST=""
          for BRANCH in $TO_DELETE; do
            echo "Deleting ${BRANCH}"
            git push target --delete "$BRANCH"
            DELETED_LIST="${DELETED_LIST}${BRANCH},"
          done

          # Strip trailing comma and write to step output
          echo "deleted_branches=${DELETED_LIST%,}" >> "$GITHUB_OUTPUT"

      - name: Close sync-failure issues on success
        id: close_issues
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            // Issues closed here carry the `auto-resolved` label so you can
            // filter them in the GitHub issue dashboard:
            //   Auto-resolved:   label:auto-resolved is:closed
            //   Manually closed: label:sync-failure -label:auto-resolved is:closed
            // See docs/issue-filters.md for saved search URLs and audit guidance.

            // Ensure the auto-resolved label exists; create it if not.
            const AUTO_LABEL = 'auto-resolved';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: AUTO_LABEL,
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: AUTO_LABEL,
                  color: '0e8a16',
                  description: 'Issue was closed automatically by a successful workflow run',
                });
                console.log(`Created label "${AUTO_LABEL}"`);
              } else {
                throw err;
              }
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sync-failure',
              state: 'open',
            });

            const closed = [];

            for (const issue of issues) {
              // Tag the issue before closing so the label is visible in history.
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [AUTO_LABEL],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '### ✅ Sync resolved',
                  '',
                  `The sync is healthy again as of run [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
                  '',
                  `**Commit:** \`${context.sha.slice(0, 7)}\` · **Actor:** @${context.actor}`,
                  '',
                  '_Closing automatically — reopen if the problem recurs._',
                ].join('\n'),
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });

              console.log(`Closed issue #${issue.number}`);
              closed.push({ number: issue.number, url: issue.html_url });
            }

            if (issues.length === 0) {
              console.log('No open sync-failure issues to close.');
            }

            core.setOutput('closed_count', closed.length);
            core.setOutput('closed_json', JSON.stringify(closed));

      - name: Post bulk-resolve summary on oldest issue
        if: success() && fromJSON(steps.close_issues.outputs.closed_count) >= 2
        uses: actions/github-script@v7
        with:
          script: |
            const closed = JSON.parse('${{ steps.close_issues.outputs.closed_json }}');
            // listForRepo returns newest-first, so closed[0] is newest and
            // closed[closed.length - 1] is the oldest (primary) issue.
            const oldest = closed[closed.length - 1];
            const siblings = closed.slice(0, closed.length - 1);

            const siblingLines = siblings
              .map(i => `- #${i.number}`)
              .join('\n');

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '### 📋 Bulk-resolve summary',
              '',
              `This was the primary (oldest) open sync-failure issue. ` +
              `${siblings.length} sibling issue${siblings.length === 1 ? ' was' : 's were'} also closed at the same time by run [#${context.runNumber}](${runUrl}):`,
              '',
              siblingLines,
              '',
              `**Commit:** \`${context.sha.slice(0, 7)}\` · **Actor:** @${context.actor}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: oldest.number,
              body,
            });

            console.log(
              `Posted bulk-resolve summary on oldest issue #${oldest.number} ` +
              `listing ${siblings.length} sibling(s): ${siblings.map(i => '#' + i.number).join(', ')}`
            );

      - name: Notify Slack on sync recovery
        if: success() && fromJSON(steps.close_issues.outputs.closed_count) >= 1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ALERT_CHANNEL: ${{ vars.SLACK_ALERT_CHANNEL }}
        uses: actions/github-script@v7
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning('SLACK_WEBHOOK_URL is not set — skipping sync-recovery Slack notification');
              await core.summary
                .addRaw(
                  '> ⚠️ **Slack summary skipped** — `SLACK_WEBHOOK_URL` is not configured. ' +
                  'The sync-recovery notification was not sent to Slack. ' +
                  'Set the secret under **Settings → Secrets and variables → Actions** to enable Slack alerts.'
                )
                .write();
              return;
            }

            const closed = JSON.parse('${{ steps.close_issues.outputs.closed_json }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);

            const issueWord = closed.length === 1 ? 'issue' : 'issues';
            const issueLines = closed
              .map(i => `• <${i.url}|#${i.number}>`)
              .join('\n');

            const text = `:white_check_mark: *Sync recovered — ${closed.length} ${issueWord} resolved* (run #${context.runNumber})`;
            const mrkdwn =
              `:white_check_mark: *Sync recovered* — ${closed.length} sync-failure ${issueWord} auto-closed — run #${context.runNumber}\n` +
              `*Commit:* \`${shortSha}\` · *Actor:* @${context.actor}\n` +
              `*Resolved ${issueWord}:*\n${issueLines}\n` +
              `<${runUrl}|View run>`;

            const channel = process.env.SLACK_ALERT_CHANNEL;
            const payload = {
              text,
              ...(channel ? { channel } : {}),
              blocks: [
                {
                  type: 'section',
                  text: { type: 'mrkdwn', text: mrkdwn },
                },
              ],
            };

            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              core.warning(`Slack webhook returned ${response.status}: ${await response.text()}`);
            } else {
              console.log(`Slack recovery notification sent for ${closed.length} resolved ${issueWord}`);
            }

      - name: Notify Slack on branch pruning
        if: success() && steps.prune.outputs.deleted_branches != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ALERT_CHANNEL: ${{ vars.SLACK_ALERT_CHANNEL }}
          DELETED_BRANCHES: ${{ steps.prune.outputs.deleted_branches }}
        uses: actions/github-script@v7
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning('SLACK_WEBHOOK_URL is not set — skipping branch-pruning Slack notification');
              return;
            }

            const deleted = process.env.DELETED_BRANCHES.split(',').filter(Boolean);
            const retention = process.env.BACKUP_RETENTION_COUNT;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const branchLines = deleted.map(b => `• \`${b}\``).join('\n');
            const text = `:wastebasket: *${deleted.length} backup branch(es) pruned* (retention: ${retention})`;
            const mrkdwn =
              `:wastebasket: *${deleted.length} old backup branch(es) pruned* — run #${context.runNumber}\n` +
              `*Retention count:* ${retention}\n` +
              `*Deleted:*\n${branchLines}\n` +
              `<${runUrl}|View run>`;

            const channel = process.env.SLACK_ALERT_CHANNEL;
            const payload = {
              text,
              ...(channel ? { channel } : {}),
              blocks: [
                {
                  type: 'section',
                  text: { type: 'mrkdwn', text: mrkdwn },
                },
              ],
            };

            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              core.warning(`Slack webhook returned ${response.status}: ${await response.text()}`);
            } else {
              console.log(`Slack pruning notice sent for ${deleted.length} deleted branch(es)`);
            }

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ALERT_CHANNEL: ${{ vars.SLACK_ALERT_CHANNEL }}
          SLACK_RETRY_NOTICE_CAP: ${{ env.SLACK_RETRY_NOTICE_CAP }}
          DELETED_BRANCHES: ${{ steps.prune.outputs.deleted_branches }}
          PUSH_ERROR: ${{ steps.push.outputs.push_error }}
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sync-failure',
              state: 'open',
            });

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);
            const isRetry = issues.length > 0;

            // ── Push error snippet ───────────────────────────────────────────
            // Captured from the "Push to target repository" step's stderr.
            // Truncated to 300 chars so Slack messages stay readable.
            const rawPushError = (process.env.PUSH_ERROR || '').trim();
            const pushErrorSnippet = rawPushError
              ? rawPushError.slice(0, 300) + (rawPushError.length > 300 ? '…' : '')
              : '';
            // Slack mrkdwn block (empty string when no error was captured)
            const errorBlock = pushErrorSnippet
              ? `\n*Error:* \`\`\`${pushErrorSnippet}\`\`\``
              : '';
            // Plain-text version for GitHub issue/comment (fenced code block)
            const errorMd = pushErrorSnippet
              ? `\n\n**Push error:**\n\`\`\`\n${pushErrorSnippet}\n\`\`\``
              : '';

            // ── Helpers for Slack thread-ts storage in issue body ────────────
            // The ts is embedded as an HTML comment so it is invisible in the
            // rendered issue but easy to parse: <!-- slack-thread-ts: 1234.56 -->
            function extractSlackTs(body) {
              const m = (body || '').match(/<!--\s*slack-thread-ts:\s*(\S+)\s*-->/);
              return m ? m[1] : null;
            }

            function appendSlackTs(body, ts) {
              // Replace an existing marker or append a new one.
              const marker = `<!-- slack-thread-ts: ${ts} -->`;
              if (/<!--\s*slack-thread-ts:/.test(body)) {
                return body.replace(/<!--\s*slack-thread-ts:\s*\S+\s*-->/, marker);
              }
              return body + '\n' + marker;
            }

            function appendSlackLink(body, ts, channelId) {
              // Replace an existing deep-link line or append a new one.
              const link = `🔗 [Slack thread](https://slack.com/app_redirect?channel=${channelId}&message_ts=${ts})`;
              const pattern = /🔗 \[Slack thread\]\(https:\/\/slack\.com\/app_redirect\?[^)]+\)/;
              if (pattern.test(body)) {
                return body.replace(pattern, link);
              }
              return body + '\n' + link;
            }

            // ── Helpers for explicit retry counter in issue body ─────────────
            // The counter is stored as an HTML comment so it is invisible in
            // the rendered issue but easy to parse:
            //   <!-- slack-retry-count: N -->
            // Using an explicit marker instead of issue.comments makes the cap
            // immune to unrelated human comments inflating the counter.
            function extractRetryCount(body) {
              const m = (body || '').match(/<!--\s*slack-retry-count:\s*(\d+)\s*-->/);
              return m ? parseInt(m[1], 10) : 0;
            }

            function setRetryCount(body, count) {
              const marker = `<!-- slack-retry-count: ${count} -->`;
              if (/<!--\s*slack-retry-count:/.test(body)) {
                return body.replace(/<!--\s*slack-retry-count:\s*\d+\s*-->/, marker);
              }
              return body + '\n' + marker;
            }

            // ── GitHub issue de-duplication ──────────────────────────────────
            let existingIssue = null;
            if (isRetry) {
              existingIssue = issues[0];

              // Strip the auto-resolved label if present — the issue is no longer resolved.
              const hasAutoResolved = existingIssue.labels.some(
                l => (typeof l === 'string' ? l : l.name) === 'auto-resolved'
              );
              if (hasAutoResolved) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  name: 'auto-resolved',
                });
                console.log(`Removed "auto-resolved" label from issue #${existingIssue.number}`);
              }

              // Add a comment to the existing open issue instead of spamming new ones
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### New failure on run #${context.runNumber}\n\n` +
                      `**Commit:** \`${shortSha}\` · **Actor:** @${context.actor}\n\n` +
                      `[View run](${runUrl})` +
                      errorMd,
              });
              console.log(`Commented on existing issue #${existingIssue.number}`);
            } else {
              const title = `🔴 Sync to GitHub failed (run #${context.runNumber})`;
              const body = [
                '## Sync failure detected',
                '',
                `**Workflow run:** [#${context.runNumber}](${runUrl})`,
                `**Triggered by commit:** \`${shortSha}\` on branch \`${context.ref.replace('refs/heads/', '')}\``,
                `**Actor:** @${context.actor}`,
                ...(pushErrorSnippet ? [
                  '',
                  '## Push error',
                  '```',
                  pushErrorSnippet,
                  '```',
                ] : []),
                '',
                '## Likely causes',
                '- The `GITHUB_PAT` secret has expired or been revoked',
                '- A conflict exists on the target repository (`ciskybs-QRCode/StrideApp14052026`)',
                '- The target repository is unreachable or the name has changed',
                '',
                '## How to fix',
                '1. Go to **Settings → Secrets → Actions** in this repository',
                '2. Rotate the `GITHUB_PAT` if expired (needs `repo` scope)',
                '3. Re-run the failed workflow once the secret is updated',
                '',
                '_This issue was opened automatically by the Sync to GitHub workflow._',
                // Invisible marker — tracks Slack retry notices independently of
                // human comments so the cap cannot be triggered by comment noise.
                '<!-- slack-retry-count: 0 -->',
              ].join('\n');

              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sync-failure'],
              });
              existingIssue = issue;
              console.log(`Created issue #${issue.number}: ${issue.html_url}`);
            }

            // ── Fetch fresh issue body (needed for retry counter and Slack ts) ─
            // Done here — before the cap check — so both the counter update
            // and the Slack-ts read can share the same API call.
            const { data: freshIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
            });

            // ── Retry-notice cap ─────────────────────────────────────────────
            // retryCount is 1-based: 1 = first retry notice, 2 = second, etc.
            // The first-failure alert (isRetry === false) is never subject to the cap.
            // We use an explicit <!-- slack-retry-count: N --> marker in the issue
            // body rather than issue.comments so unrelated human comments cannot
            // inflate the counter and trigger the cap prematurely.
            const retryCap = parseInt(process.env.SLACK_RETRY_NOTICE_CAP, 10) || 5;
            const retryCount = isRetry ? (extractRetryCount(freshIssue.body) + 1) : null;

            if (isRetry) {
              // Write the incremented counter back to the issue body immediately
              // so the cap is correct even if subsequent steps fail or are skipped.
              const bodyWithCount = setRetryCount(freshIssue.body, retryCount);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: bodyWithCount,
              });
              console.log(`Updated slack-retry-count to ${retryCount} in issue #${existingIssue.number}`);
            }

            // retryCount > retryCap → already sent the cap-reached message; stay silent.
            if (isRetry && retryCount > retryCap) {
              console.log(
                `Retry notice cap reached (${retryCap}). ` +
                `This is retry #${retryCount} — Slack notification suppressed.`
              );
              return;
            }

            // retryCount === retryCap → send the final "going silent" notice.
            const isFinalNotice = isRetry && retryCount === retryCap;

            // ── Pruning footer (appended when branches were pruned in this run) ─
            // The pruning-notification step only fires on success(), so when the
            // workflow fails after a successful prune we include the summary here
            // instead of dropping it entirely.
            const deletedBranches = (process.env.DELETED_BRANCHES || '').split(',').filter(Boolean);
            const pruningFooter = deletedBranches.length > 0
              ? '\n:wastebasket: *Also pruned ' + deletedBranches.length +
                ' backup branch(es) in this run:*\n' +
                deletedBranches.map(b => `• \`${b}\``).join('\n')
              : '';

            // ── Slack notification (threaded when bot token is available) ────
            //
            // Threading strategy:
            //   • SLACK_BOT_TOKEN + SLACK_ALERT_CHANNEL → Slack Web API
            //     chat.postMessage returns the message `ts` which we store in
            //     the GitHub issue body so retries can reply in the same thread.
            //   • SLACK_WEBHOOK_URL only (no bot token) → fallback to Incoming
            //     Webhook; threading is not possible, behaves as before.
            //
            const botToken = process.env.SLACK_BOT_TOKEN;
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            const channel = process.env.SLACK_ALERT_CHANNEL;

            if (!botToken && !webhookUrl) {
              core.warning('Neither SLACK_BOT_TOKEN nor SLACK_WEBHOOK_URL is set — skipping Slack notification');
            } else if (botToken && channel) {
              // ── Web API path (supports threading) ───────────────────────────
              let slackText;
              let slackMrkdwn;

              if (!isRetry) {
                slackText = `:red_circle: *Sync to GitHub failed* — run #${context.runNumber}`;
                slackMrkdwn =
                  `:red_circle: *Sync to GitHub failed* — run #${context.runNumber}\n` +
                  `*Commit:* \`${shortSha}\`\n` +
                  `*Actor:* @${context.actor}\n` +
                  `<${runUrl}|View failed run>`;
              } else if (isFinalNotice) {
                slackText = `:warning: *Sync still failing — retry #${retryCount} (last notice)* (run #${context.runNumber})`;
                slackMrkdwn =
                  `:warning: *Sync still failing — retry #${retryCount}* — run #${context.runNumber}\n` +
                  `*Commit:* \`${shortSha}\` · *Actor:* @${context.actor}\n` +
                  `<${runUrl}|View run> · ` +
                  `<${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${existingIssue.number}|Open issue #${existingIssue.number}>\n` +
                  `:mute: *Retry notice cap reached (${retryCap}). Further retries will not produce Slack alerts until the sync recovers.*`;
              } else {
                slackText = `:warning: *Sync still failing — retry #${retryCount}* (run #${context.runNumber})`;
                slackMrkdwn =
                  `:warning: *Sync still failing — retry #${retryCount}* — run #${context.runNumber}\n` +
                  `*Commit:* \`${shortSha}\` · *Actor:* @${context.actor}\n` +
                  `<${runUrl}|View run> · ` +
                  `<${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${existingIssue.number}|Open issue #${existingIssue.number}>`;
              }

              // Append push error and pruning summary when present.
              slackMrkdwn += errorBlock;
              slackMrkdwn += pruningFooter;

              // freshIssue was fetched earlier (before the cap check) and is
              // reused here to avoid an extra API call.
              const threadTs = extractSlackTs(freshIssue.body);

              const apiPayload = {
                channel,
                text: slackText,
                blocks: [
                  {
                    type: 'section',
                    text: { type: 'mrkdwn', text: slackMrkdwn },
                  },
                ],
                // Reply in-thread when a parent ts is available; otherwise post
                // a new top-level message (first failure or ts not yet stored).
                ...(threadTs ? { thread_ts: threadTs } : {}),
              };

              const apiResponse = await fetch('https://slack.com/api/chat.postMessage', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${botToken}`,
                },
                body: JSON.stringify(apiPayload),
              });

              const apiResult = await apiResponse.json();

              if (!apiResult.ok) {
                core.warning(`Slack API error: ${apiResult.error}`);
              } else {
                // Determine whether this post started a new top-level thread.
                // That happens on the very first failure OR on a retry where the
                // stored thread ts was missing from the issue body (e.g. someone
                // edited the issue and accidentally removed the HTML comment).
                const startedNewThread = !isRetry || (isRetry && !threadTs);

                const label = !isRetry
                  ? 'new message'
                  : !threadTs
                    ? 'new top-level message (previous thread ts not found in issue body)'
                    : isFinalNotice
                      ? 'final notice (cap reached)'
                      : 'thread reply';
                console.log(`Slack notified via Web API (${label}), ts=${apiResult.ts}`);

                // Persist the message ts whenever a new top-level thread is
                // started: first failure, or a retry where the ts was lost.
                // Also add a visible deep-link so engineers can jump straight
                // from the issue to the Slack conversation.
                if (startedNewThread && apiResult.ts) {
                  let updatedBody = appendSlackTs(freshIssue.body, apiResult.ts);
                  updatedBody = appendSlackLink(updatedBody, apiResult.ts, apiResult.channel);
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existingIssue.number,
                    body: updatedBody,
                  });

                  if (!isRetry) {
                    console.log(`Stored Slack thread ts ${apiResult.ts} and deep-link in issue #${existingIssue.number}`);
                  } else {
                    // Retry with a lost ts: log clearly and add a visible note
                    // to the issue so the thread break is not silently ignored.
                    console.log(
                      `Previous Slack thread ts not found in issue #${existingIssue.number} body — ` +
                      `re-created thread, stored new ts ${apiResult.ts}`
                    );
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: existingIssue.number,
                      body:
                        '⚠️ Previous Slack thread ts not found in issue body — ' +
                        'started a new Slack thread for this failure incident. ' +
                        'The new thread ts has been stored so future retries will reply in the new thread.',
                    });
                  }
                }
              }
            } else {
              // ── Webhook fallback (no threading) ──────────────────────────────
              if (!webhookUrl) {
                core.warning('SLACK_BOT_TOKEN requires SLACK_ALERT_CHANNEL to be set — skipping Slack notification');
              } else {
                let slackText;
                let slackMrkdwn;

                if (!isRetry) {
                  slackText = `:red_circle: *Sync to GitHub failed* — run #${context.runNumber}`;
                  slackMrkdwn =
                    `:red_circle: *Sync to GitHub failed* — run #${context.runNumber}\n` +
                    `*Commit:* \`${shortSha}\`\n` +
                    `*Actor:* @${context.actor}\n` +
                    `<${runUrl}|View failed run>`;
                } else if (isFinalNotice) {
                  slackText = `:warning: *Sync still failing — retry #${retryCount} (last notice)* (run #${context.runNumber})`;
                  slackMrkdwn =
                    `:warning: *Sync still failing — retry #${retryCount}* — run #${context.runNumber}\n` +
                    `*Commit:* \`${shortSha}\` · *Actor:* @${context.actor}\n` +
                    `<${runUrl}|View run> · ` +
                    `<${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${existingIssue.number}|Open issue #${existingIssue.number}>\n` +
                    `:mute: *Retry notice cap reached (${retryCap}). Further retries will not produce Slack alerts until the sync recovers.*`;
                } else {
                  slackText = `:warning: *Sync still failing — retry #${retryCount}* (run #${context.runNumber})`;
                  slackMrkdwn =
                    `:warning: *Sync still failing — retry #${retryCount}* — run #${context.runNumber}\n` +
                    `*Commit:* \`${shortSha}\` · *Actor:* @${context.actor}\n` +
                    `<${runUrl}|View run> · ` +
                    `<${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${existingIssue.number}|Open issue #${existingIssue.number}>`;
                }

                // Append push error and pruning summary when present.
                slackMrkdwn += errorBlock;
                slackMrkdwn += pruningFooter;

                const payload = {
                  text: slackText,
                  ...(channel ? { channel } : {}),
                  blocks: [
                    {
                      type: 'section',
                      text: { type: 'mrkdwn', text: slackMrkdwn },
                    },
                  ],
                };

                const response = await fetch(webhookUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload),
                });

                if (!response.ok) {
                  core.warning(`Slack webhook returned ${response.status}: ${await response.text()}`);
                } else {
                  const label = !isRetry ? 'first-failure alert' : isFinalNotice ? 'final notice (cap reached)' : 'retry notice';
                  console.log(`Slack notified via webhook (${label}) — threading not available without SLACK_BOT_TOKEN`);
                }
              }
            }
