name: Sync to GitHub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # To change retention without editing this file, set the BACKUP_RETENTION_COUNT
      # repository variable under Settings → Secrets and variables → Actions → Variables.
      BACKUP_RETENTION_COUNT: ${{ vars.BACKUP_RETENTION_COUNT || 7 }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preflight — check Slack webhook secret
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            if (!process.env.SLACK_WEBHOOK_URL) {
              core.warning(
                'SLACK_WEBHOOK_URL secret is not set. ' +
                'Slack notifications will be silently skipped for the entire run. ' +
                'See docs/slack-alerts.md for setup instructions.'
              );
            } else {
              console.log('SLACK_WEBHOOK_URL is configured — Slack notifications are active.');
            }

      - name: Push to target repository
        id: push
        run: |
          git remote add target https://x-access-token:${{ secrets.GITHUB_PAT }}@github.com/ciskybs-QRCode/StrideApp14052026.git

          # Strategy: create a dated backup branch on the target before force-pushing.
          # This preserves any commits that exist only on the target (e.g. hotfixes
          # pushed directly there) so they can always be recovered, even though
          # --force will overwrite target/main.
          BACKUP_BRANCH="backup/main-$(date -u +%Y%m%d-%H%M%S)"
          git fetch target main --depth=1 || true
          if git rev-parse FETCH_HEAD &>/dev/null; then
            git push target "FETCH_HEAD:refs/heads/${BACKUP_BRANCH}"
            echo "Created backup branch ${BACKUP_BRANCH} on target"
          else
            echo "Target main does not exist yet — skipping backup branch creation"
          fi

          git push target main --force

      - name: Prune old backup branches on target
        id: prune
        if: success()
        run: |
          git fetch target 'refs/heads/backup/main-*:refs/remotes/target/backup/main-*' --prune 2>/dev/null || true

          # List backup branches sorted newest-first (branch names are dated so lexicographic = chronological)
          BACKUPS=$(git branch -r --list 'target/backup/main-*' | sed 's|target/||' | sort -r)

          TOTAL=$(echo "$BACKUPS" | grep -c . || true)
          echo "Found ${TOTAL} backup branch(es); keeping ${BACKUP_RETENTION_COUNT}"

          if [ "$TOTAL" -le "$BACKUP_RETENTION_COUNT" ]; then
            echo "Nothing to prune."
            echo "deleted_branches=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TO_DELETE=$(echo "$BACKUPS" | tail -n +"$((BACKUP_RETENTION_COUNT + 1))")
          DELETED_LIST=""
          for BRANCH in $TO_DELETE; do
            echo "Deleting ${BRANCH}"
            git push target --delete "$BRANCH"
            DELETED_LIST="${DELETED_LIST}${BRANCH},"
          done

          # Strip trailing comma and write to step output
          echo "deleted_branches=${DELETED_LIST%,}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack on branch pruning
        if: success() && steps.prune.outputs.deleted_branches != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ALERT_CHANNEL: ${{ vars.SLACK_ALERT_CHANNEL }}
          DELETED_BRANCHES: ${{ steps.prune.outputs.deleted_branches }}
        uses: actions/github-script@v7
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning('SLACK_WEBHOOK_URL is not set — skipping branch-pruning Slack notification');
              return;
            }

            const deleted = process.env.DELETED_BRANCHES.split(',').filter(Boolean);
            const retention = process.env.BACKUP_RETENTION_COUNT;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const branchLines = deleted.map(b => `• \`${b}\``).join('\n');
            const text = `:wastebasket: *${deleted.length} backup branch(es) pruned* (retention: ${retention})`;
            const mrkdwn =
              `:wastebasket: *${deleted.length} old backup branch(es) pruned* — run #${context.runNumber}\n` +
              `*Retention count:* ${retention}\n` +
              `*Deleted:*\n${branchLines}\n` +
              `<${runUrl}|View run>`;

            const channel = process.env.SLACK_ALERT_CHANNEL;
            const payload = {
              text,
              ...(channel ? { channel } : {}),
              blocks: [
                {
                  type: 'section',
                  text: { type: 'mrkdwn', text: mrkdwn },
                },
              ],
            };

            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              core.warning(`Slack webhook returned ${response.status}: ${await response.text()}`);
            } else {
              console.log(`Slack pruning notice sent for ${deleted.length} deleted branch(es)`);
            }

      - name: Close sync-failure issues on success
        id: close_issues
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            // Ensure the auto-resolved label exists; create it if not.
            const AUTO_LABEL = 'auto-resolved';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: AUTO_LABEL,
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: AUTO_LABEL,
                  color: '0e8a16',
                  description: 'Issue was closed automatically by a successful workflow run',
                });
                console.log(`Created label "${AUTO_LABEL}"`);
              } else {
                throw err;
              }
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sync-failure',
              state: 'open',
            });

            const closed = [];

            for (const issue of issues) {
              // Tag the issue before closing so the label is visible in history.
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [AUTO_LABEL],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '### ✅ Sync resolved',
                  '',
                  `The sync is healthy again as of run [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
                  '',
                  `**Commit:** \`${context.sha.slice(0, 7)}\` · **Actor:** @${context.actor}`,
                  '',
                  '_Closing automatically — reopen if the problem recurs._',
                ].join('\n'),
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });

              console.log(`Closed issue #${issue.number}`);
              closed.push({ number: issue.number, url: issue.html_url });
            }

            if (issues.length === 0) {
              console.log('No open sync-failure issues to close.');
            }

            core.setOutput('closed_count', closed.length);
            core.setOutput('closed_json', JSON.stringify(closed));

      - name: Notify Slack on sync recovery
        if: success() && fromJSON(steps.close_issues.outputs.closed_count) >= 1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ALERT_CHANNEL: ${{ vars.SLACK_ALERT_CHANNEL }}
        uses: actions/github-script@v7
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning('SLACK_WEBHOOK_URL is not set — skipping sync-recovery Slack notification');
              return;
            }

            const closed = JSON.parse('${{ steps.close_issues.outputs.closed_json }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);

            const issueWord = closed.length === 1 ? 'issue' : 'issues';
            const issueLines = closed
              .map(i => `• <${i.url}|#${i.number}>`)
              .join('\n');

            const text = `:white_check_mark: *Sync recovered — ${closed.length} ${issueWord} resolved* (run #${context.runNumber})`;
            const mrkdwn =
              `:white_check_mark: *Sync recovered* — ${closed.length} sync-failure ${issueWord} auto-closed — run #${context.runNumber}\n` +
              `*Commit:* \`${shortSha}\` · *Actor:* @${context.actor}\n` +
              `*Resolved ${issueWord}:*\n${issueLines}\n` +
              `<${runUrl}|View run>`;

            const channel = process.env.SLACK_ALERT_CHANNEL;
            const payload = {
              text,
              ...(channel ? { channel } : {}),
              blocks: [
                {
                  type: 'section',
                  text: { type: 'mrkdwn', text: mrkdwn },
                },
              ],
            };

            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              core.warning(`Slack webhook returned ${response.status}: ${await response.text()}`);
            } else {
              console.log(`Slack recovery notification sent for ${closed.length} resolved ${issueWord}`);
            }

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ALERT_CHANNEL: ${{ vars.SLACK_ALERT_CHANNEL }}
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sync-failure',
              state: 'open',
            });

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);
            const isRetry = issues.length > 0;

            // ── Helpers for Slack thread-ts storage in issue body ────────────
            // The ts is embedded as an HTML comment so it is invisible in the
            // rendered issue but easy to parse: <!-- slack-thread-ts: 1234.56 -->
            function extractSlackTs(body) {
              const m = (body || '').match(/<!--\s*slack-thread-ts:\s*(\S+)\s*-->/);
              return m ? m[1] : null;
            }

            function appendSlackTs(body, ts) {
              // Replace an existing marker or append a new one.
              const marker = `<!-- slack-thread-ts: ${ts} -->`;
              if (/<!--\s*slack-thread-ts:/.test(body)) {
                return body.replace(/<!--\s*slack-thread-ts:\s*\S+\s*-->/, marker);
              }
              return body + '\n' + marker;
            }

            // ── GitHub issue de-duplication ──────────────────────────────────
            let existingIssue = null;
            if (isRetry) {
              existingIssue = issues[0];
              // Add a comment to the existing open issue instead of spamming new ones
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### New failure on run #${context.runNumber}\n\n` +
                      `**Commit:** \`${shortSha}\` · **Actor:** @${context.actor}\n\n` +
                      `[View run](${runUrl})`,
              });
              console.log(`Commented on existing issue #${existingIssue.number}`);
            } else {
              const title = `🔴 Sync to GitHub failed (run #${context.runNumber})`;
              const body = [
                '## Sync failure detected',
                '',
                `**Workflow run:** [#${context.runNumber}](${runUrl})`,
                `**Triggered by commit:** \`${shortSha}\` on branch \`${context.ref.replace('refs/heads/', '')}\``,
                `**Actor:** @${context.actor}`,
                '',
                '## Likely causes',
                '- The `GITHUB_PAT` secret has expired or been revoked',
                '- A conflict exists on the target repository (`ciskybs-QRCode/StrideApp14052026`)',
                '- The target repository is unreachable or the name has changed',
                '',
                '## How to fix',
                '1. Go to **Settings → Secrets → Actions** in this repository',
                '2. Rotate the `GITHUB_PAT` if expired (needs `repo` scope)',
                '3. Re-run the failed workflow once the secret is updated',
                '',
                '_This issue was opened automatically by the Sync to GitHub workflow._',
              ].join('\n');

              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sync-failure'],
              });
              existingIssue = issue;
              console.log(`Created issue #${issue.number}: ${issue.html_url}`);
            }

            // ── Slack notification (threaded when bot token is available) ────
            //
            // Threading strategy:
            //   • SLACK_BOT_TOKEN + SLACK_ALERT_CHANNEL → Slack Web API
            //     chat.postMessage returns the message `ts` which we store in
            //     the GitHub issue body so retries can reply in the same thread.
            //   • SLACK_WEBHOOK_URL only (no bot token) → fallback to Incoming
            //     Webhook; threading is not possible, behaves as before.
            //
            const botToken = process.env.SLACK_BOT_TOKEN;
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            const channel = process.env.SLACK_ALERT_CHANNEL;

            if (!botToken && !webhookUrl) {
              core.warning('Neither SLACK_BOT_TOKEN nor SLACK_WEBHOOK_URL is set — skipping Slack notification');
            } else if (botToken && channel) {
              // ── Web API path (supports threading) ───────────────────────────
              const retryCount = isRetry ? (existingIssue.comments + 1) : null;

              let slackText;
              let slackMrkdwn;

              if (isRetry) {
                slackText = `:warning: *Sync still failing — retry #${retryCount}* (run #${context.runNumber})`;
                slackMrkdwn =
                  `:warning: *Sync still failing — retry #${retryCount}* — run #${context.runNumber}\n` +
                  `*Commit:* \`${shortSha}\` · *Actor:* @${context.actor}\n` +
                  `<${runUrl}|View run> · ` +
                  `<${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${existingIssue.number}|Open issue #${existingIssue.number}>`;
              } else {
                slackText = `:red_circle: *Sync to GitHub failed* — run #${context.runNumber}`;
                slackMrkdwn =
                  `:red_circle: *Sync to GitHub failed* — run #${context.runNumber}\n` +
                  `*Commit:* \`${shortSha}\`\n` +
                  `*Actor:* @${context.actor}\n` +
                  `<${runUrl}|View failed run>`;
              }

              // Fetch the latest issue body to read the stored thread ts.
              const { data: freshIssue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
              });
              const threadTs = extractSlackTs(freshIssue.body);

              const apiPayload = {
                channel,
                text: slackText,
                blocks: [
                  {
                    type: 'section',
                    text: { type: 'mrkdwn', text: slackMrkdwn },
                  },
                ],
                // Reply in-thread when a parent ts is available; otherwise post
                // a new top-level message (first failure or ts not yet stored).
                ...(threadTs ? { thread_ts: threadTs } : {}),
              };

              const apiResponse = await fetch('https://slack.com/api/chat.postMessage', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${botToken}`,
                },
                body: JSON.stringify(apiPayload),
              });

              const apiResult = await apiResponse.json();

              if (!apiResult.ok) {
                core.warning(`Slack API error: ${apiResult.error}`);
              } else {
                console.log(`Slack notified via Web API (${isRetry ? 'thread reply' : 'new message'}), ts=${apiResult.ts}`);

                // On first failure, persist the message ts in the issue body so
                // subsequent retries can post as thread replies.
                if (!isRetry && apiResult.ts) {
                  const updatedBody = appendSlackTs(freshIssue.body, apiResult.ts);
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existingIssue.number,
                    body: updatedBody,
                  });
                  console.log(`Stored Slack thread ts ${apiResult.ts} in issue #${existingIssue.number}`);
                }
              }
            } else {
              // ── Webhook fallback (no threading) ──────────────────────────────
              if (!webhookUrl) {
                core.warning('SLACK_BOT_TOKEN requires SLACK_ALERT_CHANNEL to be set — skipping Slack notification');
              } else {
                const retryCount = isRetry ? (existingIssue.comments + 1) : null;
                let slackText;
                let slackMrkdwn;

                if (isRetry) {
                  slackText = `:warning: *Sync still failing — retry #${retryCount}* (run #${context.runNumber})`;
                  slackMrkdwn =
                    `:warning: *Sync still failing — retry #${retryCount}* — run #${context.runNumber}\n` +
                    `*Commit:* \`${shortSha}\` · *Actor:* @${context.actor}\n` +
                    `<${runUrl}|View run> · ` +
                    `<${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${existingIssue.number}|Open issue #${existingIssue.number}>`;
                } else {
                  slackText = `:red_circle: *Sync to GitHub failed* — run #${context.runNumber}`;
                  slackMrkdwn =
                    `:red_circle: *Sync to GitHub failed* — run #${context.runNumber}\n` +
                    `*Commit:* \`${shortSha}\`\n` +
                    `*Actor:* @${context.actor}\n` +
                    `<${runUrl}|View failed run>`;
                }

                const payload = {
                  text: slackText,
                  ...(channel ? { channel } : {}),
                  blocks: [
                    {
                      type: 'section',
                      text: { type: 'mrkdwn', text: slackMrkdwn },
                    },
                  ],
                };

                const response = await fetch(webhookUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload),
                });

                if (!response.ok) {
                  core.warning(`Slack webhook returned ${response.status}: ${await response.text()}`);
                } else {
                  console.log(`Slack notified via webhook (${isRetry ? 'retry notice' : 'first-failure alert'}) — threading not available without SLACK_BOT_TOKEN`);
                }
              }
            }
